<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE ABYSS | 35組全牌義高清版</title>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        :root {
            --bg: #030305; --tv-case: #2c2c32; --screen-bg: #050805;
            --phosphor-green: #39ff14; --fire: #ff3e3e; --card-gold: #c5a059; --news-red: #cc0000;
        }
        body {
            background-color: var(--bg); background-image: radial-gradient(circle at center, #1a1a2e 0%, #030305 100%);
            font-family: 'Courier New', 'PingFang TC', monospace; display: flex; align-items: center; justify-content: center;
            min-height: 100vh; margin: 0; overflow: hidden; touch-action: manipulation;
        }
        /* --- 手機直式重裝機身 --- */
        .tv-chassis {
            position: relative; background: var(--tv-case); border-radius: 30px; padding: 15px; width: 92vw; max-width: 380px;
            border: 5px solid #111; box-shadow: inset 0 5px 15px rgba(255,255,255,0.1), 0 30px 60px rgba(0,0,0,0.9);
            display: flex; flex-direction: column; gap: 10px;
        }
        .screen-bezel { background: #000; border-radius: 20px; padding: 10px; box-shadow: inset 0 5px 30px rgba(0,0,0,1); border: 2px solid #222; }
        .crt-screen { 
            position: relative; background: var(--screen-bg); border-radius: 12px; width: 100%; height: 58vh; 
            overflow: hidden; border: 2px solid #1a2e1a; display: flex; flex-direction: column;
        }
        /* 新聞跑馬燈 */
        .news-ticker {
            position: absolute; bottom: 0; left: 0; width: 100%; background: rgba(0, 0, 0, 0.9);
            border-top: 1px solid var(--phosphor-green); color: var(--phosphor-green); height: 40px; line-height: 40px;
            font-size: 1.1rem; white-space: nowrap; overflow: hidden; z-index: 10;
        }
        .ticker-text { display: inline-block; padding-left: 100%; animation: ticker 12s linear infinite; }
        @keyframes ticker { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }
        .breaking-label { position: absolute; bottom: 0; left: 0; background: var(--news-red); color: white; padding: 0 10px; height: 40px; line-height: 40px; z-index: 11; font-weight: 900; }
        #trash-input { width: 100%; flex-grow: 1; background: transparent; border: none; outline: none; resize: none; color: var(--phosphor-green); font-size: 1.8rem; font-weight: bold; padding: 20px; text-shadow: 0 0 8px rgba(57, 255, 20, 0.6); font-family: inherit; }
        .power-btn { background: #a00; color: #fff; border: 3px solid #500; padding: 12px; border-radius: 8px; font-size: 1.2rem; font-weight: 900; cursor: pointer; box-shadow: 0 5px 0 #300; width: 100%; margin-top: 10px; }
        .tv-shutdown { animation: tvOff 0.5s forwards; }
        @keyframes tvOff { 0% { transform: scale(1, 1); } 40% { transform: scale(1, 0.005); background: #fff; } 100% { transform: scale(0, 0); opacity: 0; } }
        /* --- 抽牌彈窗 --- */
        #card-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); display: none; align-items: center; justify-content: center; z-index: 2000; }
        .tarot-card { width: 88vw; max-width: 350px; min-height: 82vh; background: #0a0a0c; border: 3px solid var(--card-gold); border-radius: 15px; padding: 20px; display: flex; flex-direction: column; align-items: center; text-align: center; }
        .card-visual-box { width: 160px; height: 270px; border: 2px solid #333; margin-bottom: 15px; background: #111; position: relative; overflow: hidden; }
        .card-img { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; z-index: 5; }
        .card-name { color: var(--fire); font-size: 2.5rem; font-weight: 900; margin-bottom: 10px; text-decoration: underline; }
        .card-desc { font-size: 1.6rem; line-height: 1.4; color: #fff; font-weight: bold; margin-bottom: 20px; }
        .action-btns { display: flex; flex-direction: column; gap: 8px; width: 100%; margin-top: auto; }
        .share-btn { background: var(--card-gold); color: #000; border: none; padding: 12px; border-radius: 8px; font-weight: 900; font-size: 1.1rem; }
        .close-btn { background: #333; color: #fff; border: none; padding: 10px; border-radius: 8px; font-weight: 900; font-size: 1rem; }
    </style>
</head>
<body>
<div class="tv-chassis" id="tv-frame">
    <div class="screen-bezel">
        <div class="crt-screen" id="tv-screen">
            <textarea id="trash-input" placeholder="> 訊號捕捉中..." oninput="updateTicker()"></textarea>
            <div class="breaking-label" id="ticker-label">LIVE</div>
            <div class="news-ticker"><div class="ticker-text" id="ticker-msg">>>> 訊號強度 100% >>> 正在捕捉情緒訊號... >>></div></div>
        </div>
    </div>
    <button class="power-btn" onclick="execute()">[ 焚毀執行 ]</button>
</div>
<div id="card-overlay"><div class="tarot-card" id="capture-area">
    <div style="font-size: 0.7rem; color: #555; margin-bottom: 8px; letter-spacing: 3px;">ABYSS NEWS CHANNEL</div>
    <div style="color: #666; font-size: 0.8rem; border-bottom: 1px solid #333; padding-bottom: 5px; margin-bottom: 15px; width: 100%;">訊號來源：<span style="color:var(--phosphor-green)" id="disp-orig"></span></div>
    <div class="card-visual-box">
        <img id="c-img" class="card-img" src="" alt="" crossorigin="anonymous">
    </div>
    <div class="card-name" id="c-name"></div>
    <div class="card-desc" id="c-desc"></div>
    <div class="action-btns"><button class="share-btn" onclick="saveSnapshot()">📸 生成截圖發 IG 限動</button><button class="close-btn" onclick="closeOverlay()">重新開機</button></div>
</div></div>
<script>
    const imgBaseUrl = "https://cdn.jsdelivr.net/gh/ekelen/tarot@master/img/";
    const deck = [
        { n: "0. 愚者", img: "m00.jpg", d: "冒險只是無知的代稱。你沒腦子，撞牆也不痛。" },
        { n: "1. 魔術師", img: "m01.jpg", d: "你不是有才華，只是愛吹牛。認命回去搬磚。" },
        { n: "2. 女祭司", img: "m02.jpg", d: "沉默不是智慧是尷尬。沒人想懂你的內心戲。" },
        { n: "3. 皇后", img: "m03.jpg", d: "儀式感救不了戶頭。你是窮人的命公主的病。" },
        { n: "4. 皇帝", img: "m04.jpg", d: "老闆是你爹，公司是你家。跪著把錢掙了。" },
        { n: "5. 教皇", img: "m05.jpg", d: "貧窮是你的職業。認命吧，這輩子沒救了。" },
        { n: "6. 戀人", img: "m06.jpg", d: "他沒回你是在跟別人忙。你只是備胎裡的殘次品。" },
        { n: "7. 戰車", img: "m07.jpg", d: "衝向未來？不，是衝向勞改營。別想跳車。" },
        { n: "8. 力量", img: "m08.jpg", d: "堅持不會成功只會過勞。放棄吧，牆比你硬。" },
        { n: "9. 隱士", img: "m09.jpg", d: "沒人找你是因為你可有可無。安靜發霉吧。" },
        { n: "10. 命運輪", img: "m10.jpg", d: "輪流轉是指別人發財你倒霉。認命被壓死。" },
        { n: "11. 正義", img: "m11.jpg", d: "沒錢就沒資格喊累。上班是你的現世報。" },
        { n: "12. 倒吊人", img: "m12.jpg", d: "無謂的犧牲只是自我感動。換個姿勢受苦吧。" },
        { n: "13. 死神", img: "m13.jpg", d: "期待結束是奢侈。痛苦只會輪迴，躺平受死吧。" },
        { n: "14. 節制", img: "m14.jpg", d: "追求平衡是因為沒膽。你的人生注定一碗清水。" },
        { n: "15. 惡魔", img: "m15.jpg", d: "你是薪水的性奴。回去戴上枷鎖，別想了。" },
        { n: "16. 塔", img: "m16.jpg", d: "崩塌是因為地基太爛。就在廢墟裡坐好，別亂動。" },
        { n: "17. 星星", img: "m17.jpg", d: "夢想是拿來燒的。看著餘燼早點睡，別做夢。" },
        { n: "18. 月亮", img: "m18.jpg", d: "粉紅泡泡是腦部積水。他連你名字都記不住。" },
        { n: "19. 太陽", img: "m19.jpg", d: "陽光讓你更醜。黑暗才是歸宿，別裝正能量。" },
        { n: "20. 審判", img: "m20.jpg", d: "判決結果：繼續勞改。這是你欠生活的債。" },
        { n: "21. 世界", img: "m21.jpg", d: "繞了一圈還是在原地。你的終點就是垃圾桶。" },
        { n: "寶劍十", img: "s10.jpg", d: "你已萬箭穿心。搬著屍體去打卡認命吧。" },
        { n: "寶劍三", img: "s03.jpg", d: "心碎？不，只是認清現實。你根本不值得被愛。" },
        { n: "寶劍九", img: "s09.jpg", d: "失眠是因為你活該。醒著痛苦總比夢裡受騙好。" },
        { n: "八之寶劍", img: "s08.jpg", d: "眼罩是你自己戴的。因為現實太醜，你不敢看。" },
        { n: "聖盃八", img: "c08.jpg", d: "離開也沒用。問題在你的智商，不在環境。" },
        { n: "聖盃五", img: "c05.jpg", d: "哭也沒錢拿。剩下的半杯也是酸的，倒了吧。" },
        { n: "聖盃三", img: "c03.jpg", d: "聚會笑聲是嘲諷。你沒朋友，只有臨時演員。" },
        { n: "五之金幣", img: "p05.jpg", d: "窮不是病，但讓你像喪屍。別看餘額了。" },
        { n: "二之金幣", img: "p02.jpg", d: "忙著瞎忙？你只是在表演努力。認命當窮忙族。" },
        { n: "七之金幣", img: "p07.jpg", d: "耕耘了也沒收穫。你種的是雜草，別等了。" },
        { n: "權杖十", img: "w10.jpg", d: "累死也沒人感激。你只是台快報廢的機器。" },
        { n: "權杖九", img: "w09.jpg", d: "防衛也沒用。世界想弄死你，你擋不住的。" },
        { n: "權杖七", img: "w07.jpg", d: "一個對抗全世界？那是電影，現實是你會被打死。" }
    ];
    function updateTicker() {
        const val = document.getElementById('trash-input').value;
        const tickerMsg = document.getElementById('ticker-msg');
        if(val.trim()) tickerMsg.innerText = `>>> BREAKING NEWS：${val} >>> 執行焚毀程序... >>> `;
    }
    function execute() {
        const input = document.getElementById('trash-input');
        const val = input.value.trim();
        if(!val) return;
        document.getElementById('disp-orig').innerText = val;
        document.getElementById('tv-screen').classList.add('tv-shutdown');
        setTimeout(() => {
            const card = deck[Math.floor(Math.random() * deck.length)];
            const img = document.getElementById('c-img');
            img.src = imgBaseUrl + card.img;
            document.getElementById('c-name').innerText = card.n;
            document.getElementById('c-desc').innerText = card.d;
            document.getElementById('card-overlay').style.display = 'flex';
            input.value = ""; document.getElementById('tv-screen').classList.remove('tv-shutdown');
        }, 600);
    }
    function saveSnapshot() {
        const target = document.getElementById('capture-area');
        const btns = document.querySelector('.action-btns');
        btns.style.display = 'none';
        html2canvas(target, { backgroundColor: "#0a0a0c", useCORS: true, scale: 2 }).then(canvas => {
            const link = document.createElement('a');
            link.download = `THE-ABYSS-${Date.now()}.png`;
            link.href = canvas.toDataURL("image/png"); link.click();
            btns.style.display = 'flex';
        });
    }
    function closeOverlay() { document.getElementById('card-overlay').style.display = 'none'; }
</script>
</body>
</html>
