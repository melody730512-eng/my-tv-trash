<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE ABYSS | 78CH 職場現世報</title>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        :root {
            --bg: #030305; --tv-case: #2c2c32; --screen-bg: #050805;
            --phosphor-green: #39ff14; --fire: #ff3e3e; --card-gold: #c5a059; --news-red: #cc0000;
        }
        body {
            background-color: var(--bg); background-image: radial-gradient(circle at center, #1a1a2e 0%, #030305 100%);
            font-family: 'Courier New', 'PingFang TC', monospace; display: flex; align-items: center; justify-content: center;
            min-height: 100vh; margin: 0; overflow: hidden; touch-action: manipulation;
        }
        .tv-chassis {
            position: relative; background: var(--tv-case); border-radius: 30px; padding: 15px; width: 92vw; max-width: 380px;
            border: 5px solid #111; box-shadow: inset 0 5px 15px rgba(255,255,255,0.1), 0 30px 60px rgba(0,0,0,0.9);
            display: flex; flex-direction: column; gap: 8px;
        }
        .mode-switch { display: flex; gap: 5px; margin-bottom: 5px; }
        .mode-btn { flex: 1; padding: 10px; font-size: 0.9rem; font-weight: 900; background: #444; color: #888; border: none; border-radius: 8px; cursor: pointer; }
        .mode-btn.active { background: var(--card-gold); color: #000; box-shadow: 0 0 10px var(--card-gold); }
        .screen-bezel { background: #000; border-radius: 20px; padding: 10px; box-shadow: inset 0 5px 30px rgba(0,0,0,1); border: 2px solid #222; position: relative; }
        .crt-screen { position: relative; background: var(--screen-bg); border-radius: 12px; width: 100%; height: 50vh; overflow: hidden; border: 2px solid #1a2e1a; display: flex; flex-direction: column; }
        .crt-screen::before {
            content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 5; background-size: 100% 4px, 3px 100%; pointer-events: none;
        }
        .live-time { position: absolute; top: 12px; right: 15px; color: var(--phosphor-green); font-size: 0.7rem; font-weight: bold; z-index: 10; }
        .news-ticker { position: absolute; bottom: 0; left: 0; width: 100%; background: rgba(0, 0, 0, 0.9); border-top: 1px solid var(--phosphor-green); color: var(--phosphor-green); height: 35px; line-height: 35px; font-size: 0.9rem; white-space: nowrap; overflow: hidden; z-index: 10; }
        .ticker-text { display: inline-block; padding-left: 100%; animation: ticker 40s linear infinite; }
        @keyframes ticker { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }
        .breaking-label { position: absolute; bottom: 0; left: 0; background: var(--news-red); color: white; padding: 0 8px; height: 35px; line-height: 35px; z-index: 11; font-weight: 900; }
        #trash-input { width: 100%; flex-grow: 1; background: transparent; border: none; outline: none; resize: none; color: var(--phosphor-green); font-size: 1.5rem; font-weight: bold; padding: 20px; font-family: inherit; z-index: 6; }
        .power-btn { background: #a00; color: #fff; border: 3px solid #500; padding: 12px; border-radius: 8px; font-size: 1.2rem; font-weight: 900; cursor: pointer; width: 100%; margin-top: 5px; }
        
        #card-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); display: none; align-items: center; justify-content: center; z-index: 2000; }
        .tarot-card { width: 88vw; max-width: 350px; min-height: 80vh; background: #0a0a0c; border: 3px solid var(--card-gold); border-radius: 15px; padding: 20px; display: flex; flex-direction: column; align-items: center; text-align: center; position: relative; box-sizing: border-box; }
        .card-visual-box { width: 160px; height: 260px; border: 2px solid #333; margin-bottom: 12px; background: #111; overflow: hidden; }
        
        /* 擲茭視覺強化 */
        .divining-box { display: flex; gap: 20px; margin: 25px 0; }
        .block { width: 65px; height: 100px; background: #a00; border-radius: 60px 15px 60px 15px; border: 3px solid #500; box-shadow: inset 5px 0 10px rgba(0,0,0,0.5); }
        .block.flat { background: #600; border-radius: 10px; height: 25px; margin-top: 38px; }
        .block.stand { transform: rotateX(45deg); height: 120px; background: #d00; border: 4px solid var(--phosphor-green); animation: standGlow 1s infinite alternate; }
        @keyframes standGlow { from { box-shadow: 0 0 5px var(--phosphor-green); } to { box-shadow: 0 0 20px var(--phosphor-green); } }

        .healing-box { width: 100%; padding: 10px; border: 1px dashed var(--card-gold); background: rgba(197, 160, 89, 0.1); margin-bottom: 15px; }
        .healing-label { font-size: 0.6rem; color: var(--card-gold); margin-bottom: 5px; font-weight: 900; letter-spacing: 2px; }
        .healing-content { color: #fff; font-size: 0.9rem; font-weight: bold; }
        .action-btns { display: flex; flex-direction: column; gap: 8px; width: 100%; margin-top: auto; }
        .share-btn { background: var(--card-gold); color: #000; border: none; padding: 12px; border-radius: 8px; font-weight: 900; }
        #screenshot-preview { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.96); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 3000; }
    </style>
</head>
<body>
<div class="tv-chassis">
    <div class="mode-switch">

        <button class="mode-btn" id="btn-divine" onclick="setMode('divine')">職場現世報</button>

</div></div>

<div id="screenshot-preview" onclick="this.style.display='none'"><img id="preview-img" src="" style="width:85%; border: 2px solid var(--card-gold);"><div style="color:var(--card-gold); margin-top:10px; font-weight:bold;">長按存圖分享 IG</div></div>

        { n: "8. 力量", img: "m08.jpg", d: "堅持不會成功只會過勞。放棄吧，牆比你硬。" }, { n: "9. 隱士", img: "m09.jpg", d: "邊緣人就邊緣人，別裝清高。安靜發霉吧。" },

        { n: "聖盃五", img: "c05.jpg", d: "哭也沒錢拿。剩下的半杯也是酸的，倒了吧。" }, { n: "聖盃六", img: "c06.jpg", d: "回憶過去是因為現在太爛。你也就這樣了。" },

        { n: "聖盃九", img: "c09.jpg", d: "自鳴得意？你只是隻關在籠子裡的胖豬。" }, { n: "聖盃十", img: "c10.jpg", d: "幸福是演給別人看的。家裡早就雞飛狗跳了。" },
        { n: "聖盃侍者", img: "c11.jpg", d: "多愁善感的小廢物。同情只是你的毒藥。" }, { n: "聖盃騎士", img: "c12.jpg", d: "白馬王子是詐騙集團。你只是他名單上的一員。" },
        { n: "聖盃皇后", img: "c13.jpg", d: "溺死在情緒裡的瘋女人。你的愛是種窒息。" }, { n: "聖盃國王", img: "c14.jpg", d: "情緒勒索大師。你的溫柔全是控制。" },

    function updateTime() { document.getElementById('current-time').innerText = `LIVE ${new Date().toLocaleTimeString('zh-TW', {hour12: false})}`; }

    function execute() {
        if(!document.getElementById('trash-input').value.trim()) return;
        document.getElementById('c-healing').innerText = `對症下藥：${desserts[Math.floor(Math.random()*desserts.length)]}`;
        if(currentMode === 'tarot') {
            document.getElementById('result-tarot').style.display = 'block'; document.getElementById('result-divine').style.display = 'none';
            const card = deck[Math.floor(Math.random() * deck.length)];
            document.getElementById('c-img').src = "./img/" + card.img; document.getElementById('c-name').innerText = card.n; document.getElementById('c-desc').innerText = card.d;
        } else {
            document.getElementById('result-tarot').style.display = 'none'; document.getElementById('result-divine').style.display = 'block';
            const rand = Math.random(); let res;
            if (rand < 0.001) res = { n: "立茭 | 系統崩潰", d: "【 警告 】現實被你的無知擊碎了。禁止再次請示，立刻回工位坐好。", b: ["stand", "stand"] };
            else if (rand < 0.5) res = { n: "聖茭 | 現實特許", d: "現實特許。准你今天稍微偷懶。趁老闆沒發現，快滾。", b: ["curved", "flat"] };
            else if (rand < 0.75) res = { n: "笑茭 | 現實嘲笑", d: "現實正在嘲笑你的天真。這種問題連 HR 都懶得回答。重擲。", b: ["flat", "flat"] };
            else res = { n: "陰茭 | 現實打臉", d: "現實打臉。判決結果：門都沒有。清醒一點，回去加班吧。", b: ["curved", "curved"] };
            document.getElementById('c-name').innerText = res.n; document.getElementById('c-desc').innerText = res.d;
            document.getElementById('blocks-visual').innerHTML = res.b.map(t => `<div class="block ${t}"></div>`).join('');
        }
        document.getElementById('card-overlay').style.display = 'flex';
    }
    function saveSnapshot() { 
        const btns = document.querySelector('.action-btns'); btns.style.display = 'none';
        html2canvas(document.getElementById('capture-area'), { backgroundColor: "#0a0a0c", scale: 2, useCORS: true }).then(canvas => {
            document.getElementById('preview-img').src = canvas.toDataURL("image/png"); document.getElementById('screenshot-preview').style.display = 'flex'; btns.style.display = 'flex'; 
        });
    }
    function closeOverlay() { document.getElementById('card-overlay').style.display = 'none'; }
</script>
</body>
</html>
