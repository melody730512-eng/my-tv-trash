<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE ABYSS | 78張全頻道地獄版</title>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        :root {
            --bg: #030305; --tv-case: #2c2c32; --screen-bg: #050805;
            --phosphor-green: #39ff14; --fire: #ff3e3e; --card-gold: #c5a059; --news-red: #cc0000;
        }
        body {
            background-color: var(--bg); background-image: radial-gradient(circle at center, #1a1a2e 0%, #030305 100%);
            font-family: 'Courier New', 'PingFang TC', monospace; display: flex; align-items: center; justify-content: center;
            min-height: 100vh; margin: 0; overflow: hidden; touch-action: manipulation;
        }
        .tv-chassis {
            position: relative; background: var(--tv-case); border-radius: 30px; padding: 15px; width: 92vw; max-width: 380px;
            border: 5px solid #111; box-shadow: inset 0 5px 15px rgba(255,255,255,0.1), 0 30px 60px rgba(0,0,0,0.9);
            display: flex; flex-direction: column; gap: 10px;
        }
        .screen-bezel { background: #000; border-radius: 20px; padding: 10px; box-shadow: inset 0 5px 30px rgba(0,0,0,1); border: 2px solid #222; }
        .crt-screen { 
            position: relative; background: var(--screen-bg); border-radius: 12px; width: 100%; height: 58vh; 
            overflow: hidden; border: 2px solid #1a2e1a; display: flex; flex-direction: column;
        }
        .news-ticker {
            position: absolute; bottom: 0; left: 0; width: 100%; background: rgba(0, 0, 0, 0.9);
            border-top: 1px solid var(--phosphor-green); color: var(--phosphor-green); height: 40px; line-height: 40px;
            font-size: 1.1rem; white-space: nowrap; overflow: hidden; z-index: 10;
        }
        .ticker-text { display: inline-block; padding-left: 100%; animation: ticker 12s linear infinite; }
        @keyframes ticker { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }
        .breaking-label { position: absolute; bottom: 0; left: 0; background: var(--news-red); color: white; padding: 0 10px; height: 40px; line-height: 40px; z-index: 11; font-weight: 900; }
        #trash-input { width: 100%; flex-grow: 1; background: transparent; border: none; outline: none; resize: none; color: var(--phosphor-green); font-size: 1.8rem; font-weight: bold; padding: 20px; text-shadow: 0 0 8px rgba(57, 255, 20, 0.6); font-family: inherit; }
        .power-btn { background: #a00; color: #fff; border: 3px solid #500; padding: 12px; border-radius: 8px; font-size: 1.2rem; font-weight: 900; cursor: pointer; box-shadow: 0 5px 0 #300; width: 100%; margin-top: 10px; }
        
        #card-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); display: none; align-items: center; justify-content: center; z-index: 2000; }
        .tarot-card { width: 88vw; max-width: 350px; min-height: 82vh; background: #0a0a0c; border: 3px solid var(--card-gold); border-radius: 15px; padding: 20px; display: flex; flex-direction: column; align-items: center; text-align: center; }
        .card-visual-box { width: 170px; height: 280px; border: 2px solid #333; margin-bottom: 15px; background: #111; overflow: hidden; }
        .card-img { width: 100%; height: 100%; object-fit: cover; }
        .card-name { color: var(--fire); font-size: 2.2rem; font-weight: 900; margin-bottom: 10px; text-decoration: underline; }
        .card-desc { font-size: 1.4rem; line-height: 1.4; color: #fff; font-weight: bold; margin-bottom: 20px; }
        .action-btns { display: flex; flex-direction: column; gap: 8px; width: 100%; margin-top: auto; }
        .share-btn { background: var(--card-gold); color: #000; border: none; padding: 12px; border-radius: 8px; font-weight: 900; }
        .close-btn { background: #333; color: #fff; border: none; padding: 10px; border-radius: 8px; font-weight: 900; }

        #screenshot-preview { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 3000; }
        #preview-img { width: 85%; border: 2px solid var(--card-gold); }
        .save-hint { color: var(--card-gold); margin-top: 20px; font-weight: bold; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.3; } }
    </style>
</head>
<body>

<div class="tv-chassis" id="tv-frame">
    <div class="screen-bezel"><div class="crt-screen" id="tv-screen">
        <textarea id="trash-input" placeholder="> 訊號捕捉中..."></textarea>
        <div class="breaking-label">LIVE</div>
        <div class="news-ticker"><div class="ticker-text">>>> 78全頻道開播 >>> 深夜地獄新聞台：專治各種開工焦慮 >>></div></div>
    </div></div>
    <button class="power-btn" onclick="execute()">[ 焚毀執行 ]</button>
</div>

<div id="card-overlay"><div class="tarot-card" id="capture-area">
    <div style="font-size: 0.7rem; color: #555; margin-bottom: 8px; letter-spacing: 3px;">ABYSS 78CH NEWS</div>
    <div class="card-visual-box"><img id="c-img" class="card-img" src=""></div>
    <div class="card-name" id="c-name"></div>
    <div class="card-desc" id="c-desc"></div>
    <div class="action-btns">
        <button class="share-btn" onclick="saveSnapshot()">📸 生成截圖</button>
        <button class="close-btn" onclick="closeOverlay()">重新開機</button>
    </div>
</div></div>

<div id="screenshot-preview" onclick="this.style.display='none'">
    <div class="save-hint">【 長按圖片存入相簿 】</div>
    <img id="preview-img" src="">
    <div style="color: #666; margin-top: 15px;">點擊空白處返回</div>
</div>

<script>
    const imgBaseUrl = "./img/";
    const deck = [
        /* 大牌 (Major Arcana) */
        { n: "0. 愚者", img: "m00.jpg", d: "冒險只是無知的代稱。你沒腦子，撞牆也不痛。" },
        { n: "1. 魔術師", img: "m01.jpg", d: "才華沒變現就是垃圾。認命回去搬磚吧。" },
        { n: "2. 女祭司", img: "m02.jpg", d: "沉默不是智慧。沒人想聽你的內心戲。" },
        { n: "3. 皇后", img: "m03.jpg", d: "儀式感救不了餘額。你是窮人的命公主的病。" },
        { n: "4. 皇帝", img: "m04.jpg", d: "老闆是你爹，公司是你家。跪著把錢掙了。" },
        { n: "5. 教皇", img: "m05.jpg", d: "規則是用來弄死你的。認命當社會的零件。" },
        { n: "6. 戀人", img: "m06.jpg", d: "他沒回你是真的在忙...忙著跟別人約會。" },
        { n: "7. 戰車", img: "m07.jpg", d: "衝向未來？不，是衝向勞改營。別想跳車。" },
        { n: "8. 力量", img: "m08.jpg", d: "堅持不會成功只會過勞。放棄吧，牆比你硬。" },
        { n: "9. 隱士", img: "m09.jpg", d: "邊緣人就邊緣人，別裝清高。安靜發霉吧。" },
        { n: "10. 命運輪", img: "m10.jpg", d: "輪流轉是指別人的好事，你的霉頭。被壓死吧。" },
        { n: "11. 正義", img: "m11.jpg", d: "沒錢就沒正義。上班是你的現世報。" },
        { n: "12. 倒吊人", img: "m12.jpg", d: "無謂的犧牲只是自我感動。換個姿勢受苦。" },
        { n: "13. 死神", img: "m13.jpg", d: "期待結束是奢侈。痛苦只會輪迴，躺平吧。" },
        { n: "14. 節制", img: "m14.jpg", d: "追求平衡是因為沒膽。你的人生注定一碗清水。" },
        { n: "15. 惡魔", img: "m15.jpg", d: "你是薪水的奴隸。回去戴上枷鎖，別想了。" },
        { n: "16. 塔", img: "m16.jpg", d: "崩塌是因為地基太爛。就在廢墟裡坐好。" },
        { n: "17. 星星", img: "m17.jpg", d: "夢想是拿來燒的。看著餘燼早點睡，別做夢。" },
        { n: "18. 月亮", img: "m18.jpg", d: "焦慮是你的本色。他連你名字都沒記住。" },
        { n: "19. 太陽", img: "m19.jpg", d: "陽光讓你更醜。黑暗才是歸宿，別裝正能量。" },
        { n: "20. 審判", img: "m20.jpg", d: "判決結果：繼續勞改。這是你欠生活的債。" },
        { n: "21. 世界", img: "m21.jpg", d: "繞了一圈還是在原地。你的終點就是垃圾桶。" },

        /* 寶劍組 (Swords) */
        { n: "寶劍一", img: "s01.jpg", d: "大腦開機失敗。新的計劃只會讓你死得更快。" },
        { n: "寶劍二", img: "s02.jpg", d: "猶豫不決是因為你沒錢選。隨便選個坑跳吧。" },
        { n: "寶劍三", img: "s03.jpg", d: "心碎？不，只是認清現實。你根本不值得被愛。" },
        { n: "寶劍四", img: "s04.jpg", d: "休息是因為你廢了。躺著等死，別裝冥想。" },
        { n: "寶劍五", img: "s05.jpg", d: "贏了面子輸了人生。大家都討厭你，恭喜。" },
        { n: "寶劍六", img: "s06.jpg", d: "逃跑也沒用。問題在你的智商，不在環境。" },
        { n: "寶劍七", img: "s07.jpg", d: "自以為聰明？你只是個偷時間的小偷。" },
        { n: "寶劍八", img: "s08.jpg", d: "眼罩是你自己戴的。因為現實太醜，你不敢看。" },
        { n: "寶劍九", img: "s09.jpg", d: "失眠是因為你活該。醒著痛苦總比夢裡受騙好。" },
        { n: "寶劍十", img: "s10.jpg", d: "你已萬箭穿心。搬著屍體去打卡認命吧。" },
        { n: "寶劍侍者", img: "s11.jpg", d: "愛打聽的小人。閉上嘴，世界會更美好。" },
        { n: "寶劍騎士", img: "s12.jpg", d: "衝動是魔鬼。你不是英雄，是廉價的炮灰。" },
        { n: "寶劍皇后", img: "s13.jpg", d: "尖酸刻薄是你的盔甲。祝你孤老終生。" },
        { n: "寶劍國王", img: "s14.jpg", d: "自以為公正的暴君。沒人真心服你。" },

        /* 聖盃組 (Cups) */
        { n: "聖盃一", img: "c01.jpg", d: "情感滿溢？那是腦部積水。清醒一點。" },
        { n: "聖盃二", img: "c02.jpg", d: "承諾是屁。明天他就會把你封鎖。" },
        { n: "聖盃三", img: "c03.jpg", d: "聚會笑聲是嘲諷。你沒朋友，只有臨時演員。" },
        { n: "聖盃四", img: "c04.jpg", d: "厭倦是因為你太閒。滾回去上班就不會憂鬱了。" },
        { n: "聖盃五", img: "c05.jpg", d: "哭也沒錢拿。剩下的半杯也是酸的，倒了吧。" },
        { n: "聖盃六", img: "c06.jpg", d: "回憶過去是因為現在太爛。你這輩子也就這樣。" },
        { n: "聖盃七", img: "c07.jpg", d: "全是幻覺。你挑哪個坑，最後都是一場空。" },
        { n: "聖盃八", img: "c08.jpg", d: "離開是唯一的活路。雖然下一個地方可能更爛。" },
        { n: "聖盃九", img: "c09.jpg", d: "自鳴得意？你只是隻關在籠子裡的胖豬。" },
        { n: "聖盃十", img: "c10.jpg", d: "幸福是演給別人看的。家裡早就雞飛狗跳了。" },
        { n: "聖盃侍者", img: "c11.jpg", d: "多愁善感的小廢物。別人的同情只是你的毒藥。" },
        { n: "聖盃騎士", img: "c12.jpg", d: "白馬王子是詐騙集團。你只是他名單上的一員。" },
        { n: "聖盃皇后", img: "c13.jpg", d: "溺死在情緒裡的瘋女人。你的愛是種窒息。" },
        { n: "聖盃國王", img: "c14.jpg", d: "情緒勒索大師。你的溫柔全是控制。" },

        /* 金幣組 (Pentacles) */
        { n: "金幣一", img: "p01.jpg", d: "一塊錢救不了命。這點資本只夠買張彩券。" },
        { n: "金幣二", img: "p02.jpg", d: "忙著瞎忙？你只是在表演努力。認命吧。" },
        { n: "金幣三", img: "p03.jpg", d: "團隊合作？那是分贓不均。你只是最廉價的。" },
        { n: "金幣四", img: "p04.jpg", d: "守著那點破錢發霉。沒人會偷你那點窮酸樣。" },
        { n: "金幣五", img: "p05.jpg", d: "窮不是病，但讓你像喪屍。別看餘額了。" },
        { n: "金幣六", img: "p06.jpg", d: "施捨是種施壓。拿了這錢，你就是他的狗。" },
        { n: "金幣七", img: "p07.jpg", d: "耕耘了也沒收穫。你種的是雜草，別等了。" },
        { n: "金幣八", img: "p08.jpg", d: "重複勞動的機器。你的價值就是隨時被取代。" },
        { n: "金幣九", img: "p09.jpg", d: "有錢沒愛。你的豪華套房是你的孤島。" },
        { n: "金幣十", img: "p10.jpg", d: "家族負擔。你的繼承只是繼承一堆垃圾。" },
        { n: "金幣侍者", img: "p11.jpg", d: "學習是因為你笨。證照只是垃圾桶裡的裝飾。" },
        { n: "金幣騎士", img: "p12.jpg", d: "慢吞吞的笨蛋。機會早就被別人搶光了。" },
        { n: "金幣皇后", img: "p13.jpg", d: "守財奴。你的溫暖是用錢堆出來的假象。" },
        { n: "金幣國王", img: "p14.jpg", d: "滿腦子數字的怪物。你的靈魂值幾塊錢？" },

        /* 權杖組 (Wands) */
        { n: "權杖一", img: "w01.jpg", d: "開工啦！這是你爆肝的開始，別想逃。" },
        { n: "權杖二", img: "w02.jpg", d: "野心很大，膽子很小。看著窗外發呆比較快。" },
        { n: "權杖三", img: "w03.jpg", d: "等不到的船，看不見的未來。慢慢等死吧。" },
        { n: "權杖四", img: "w04.jpg", d: "短暫的慶祝是為了更慘的加班。回去工作。" },
        { n: "權杖五", img: "w05.jpg", d: "鬥爭沒意義。反正最後你們都是輸家。" },
        { n: "權杖六", img: "w06.jpg", d: "勝利只是假象。大家都等著看你跌下來。" },
        { n: "權杖七", img: "w07.jpg", d: "一個對抗全世界？那是電影，現實是你會被打死。" },
        { n: "權杖八", img: "w08.jpg", d: "消息很快，但全是壞消息。準備接球吧。" },
        { n: "權杖九", img: "w09.jpg", d: "防衛也沒用。世界想弄死你，你擋不住的。" },
        { n: "權杖十", img: "w10.jpg", d: "累死也沒人感激。你只是台快報廢的機器。" },
        { n: "權杖侍者", img: "w11.jpg", d: "三分鐘熱度。你的熱情比屁還快消失。" },
        { n: "權杖騎士", img: "w12.jpg", d: "盲目衝刺的傻瓜。你的終點就是牆壁。" },
        { n: "權杖皇后", img: "w13.jpg", d: "掌控欲超強的瘋婆子。大家都在背後罵你。" },
        { n: "權杖國王", img: "w14.jpg", d: "自以為領袖。其實你只是帶隊衝進火坑。" }
    ];

    function execute() {
        const input = document.getElementById('trash-input');
        if(!input.value.trim()) return;
        const card = deck[Math.floor(Math.random() * deck.length)];
        document.getElementById('c-img').src = imgBaseUrl + card.img;
        document.getElementById('c-name').innerText = card.n;
        document.getElementById('c-desc').innerText = card.d;
        document.getElementById('card-overlay').style.display = 'flex';
        input.value = "";
    }

    function saveSnapshot() {
        const target = document.getElementById('capture-area');
        const btns = document.querySelector('.action-btns');
        const previewArea = document.getElementById('screenshot-preview');
        const previewImg = document.getElementById('preview-img');

        btns.style.display = 'none';

        html2canvas(target, { 
            backgroundColor: "#0a0a0c", 
            scale: 2,
            useCORS: true
        }).then(canvas => {
            previewImg.src = canvas.toDataURL("image/png");
            previewArea.style.display = 'flex';
            btns.style.display = 'flex'; 
        });
    }

    function closeOverlay() { document.getElementById('card-overlay').style.display = 'none'; }
</script>
</body>
</html>
