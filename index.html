<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE ABYSS | 癒室聯名地獄台</title>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        :root {
            --bg: #030305; --tv-case: #2c2c32; --screen-bg: #050805;
            --phosphor-green: #39ff14; --fire: #ff3e3e; --card-gold: #c5a059; --news-red: #cc0000;
        }
        body {
            background-color: var(--bg); background-image: radial-gradient(circle at center, #1a1a2e 0%, #030305 100%);
            font-family: 'Courier New', 'PingFang TC', monospace; display: flex; align-items: center; justify-content: center;
            min-height: 100vh; margin: 0; overflow: hidden; touch-action: manipulation;
        }

        /* --- 手機直式機身 --- */
        .tv-chassis {
            position: relative; background: var(--tv-case); border-radius: 30px; padding: 15px; width: 92vw; max-width: 380px;
            border: 5px solid #111; box-shadow: inset 0 5px 15px rgba(255,255,255,0.1), 0 30px 60px rgba(0,0,0,0.9);
            display: flex; flex-direction: column; gap: 10px;
        }

        /* --- CRT 螢幕與掃描線特效 --- */
        .screen-bezel { background: #000; border-radius: 20px; padding: 10px; box-shadow: inset 0 5px 30px rgba(0,0,0,1); border: 2px solid #222; position: relative; }
        .crt-screen { 
            position: relative; background: var(--screen-bg); border-radius: 12px; width: 100%; height: 58vh; 
            overflow: hidden; border: 2px solid #1a2e1a; display: flex; flex-direction: column;
        }
        .crt-screen::before {
            content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 5; background-size: 100% 4px, 3px 100%; pointer-events: none;
        }

        /* LIVE 時間戳 */
        .live-time { position: absolute; top: 15px; right: 15px; color: var(--phosphor-green); font-size: 0.8rem; font-weight: bold; z-index: 10; font-family: monospace; }

        .news-ticker {
            position: absolute; bottom: 0; left: 0; width: 100%; background: rgba(0, 0, 0, 0.9);
            border-top: 1px solid var(--phosphor-green); color: var(--phosphor-green); height: 40px; line-height: 40px;
            font-size: 1.1rem; white-space: nowrap; overflow: hidden; z-index: 10;
        }
        .ticker-text { display: inline-block; padding-left: 100%; animation: ticker 20s linear infinite; }
        @keyframes ticker { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }
        .breaking-label { position: absolute; bottom: 0; left: 0; background: var(--news-red); color: white; padding: 0 10px; height: 40px; line-height: 40px; z-index: 11; font-weight: 900; }
        
        #trash-input { width: 100%; flex-grow: 1; background: transparent; border: none; outline: none; resize: none; color: var(--phosphor-green); font-size: 1.8rem; font-weight: bold; padding: 20px; text-shadow: 0 0 8px rgba(57, 255, 20, 0.6); font-family: inherit; position: relative; z-index: 6; }
        .power-btn { background: #a00; color: #fff; border: 3px solid #500; padding: 12px; border-radius: 8px; font-size: 1.2rem; font-weight: 900; cursor: pointer; box-shadow: 0 5px 0 #300; width: 100%; margin-top: 5px; z-index: 10; }
        
        /* --- 抽牌彈窗 --- */
        #card-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); display: none; align-items: center; justify-content: center; z-index: 2000; }
        .tarot-card { 
            width: 88vw; max-width: 350px; min-height: 82vh; background: #0a0a0c; border: 3px solid var(--card-gold); border-radius: 15px; padding: 20px; 
            display: flex; flex-direction: column; align-items: center; text-align: center; position: relative;
        }
        .card-visual-box { width: 170px; height: 280px; border: 2px solid #333; margin-bottom: 12px; background: #111; overflow: hidden; }
        .card-img { width: 100%; height: 100%; object-fit: cover; }
        .card-name { color: var(--fire); font-size: 2rem; font-weight: 900; margin-bottom: 8px; text-decoration: underline; }
        .card-desc { font-size: 1.3rem; line-height: 1.4; color: #fff; font-weight: bold; margin-bottom: 15px; }
        
        /* 癒室生存建議區 */
        .healing-box { width: 100%; padding: 10px; border: 1px dashed var(--card-gold); background: rgba(197, 160, 89, 0.1); margin-bottom: 15px; box-sizing: border-box; }
        .healing-label { font-size: 0.7rem; color: var(--card-gold); margin-bottom: 5px; letter-spacing: 2px; font-weight: 900; }
        .healing-content { color: #fff; font-size: 1rem; font-weight: bold; line-height: 1.2; }

        .watermark { position: absolute; bottom: 15px; right: 20px; color: var(--card-gold); font-size: 0.7rem; font-weight: 900; opacity: 0.6; font-style: italic; }
        .action-btns { display: flex; flex-direction: column; gap: 8px; width: 100%; margin-top: auto; }
        .share-btn { background: var(--card-gold); color: #000; border: none; padding: 12px; border-radius: 8px; font-weight: 900; }
        .close-btn { background: #333; color: #fff; border: none; padding: 10px; border-radius: 8px; font-weight: 900; }

        #screenshot-preview { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 3000; }
        #preview-img { width: 85%; border: 2px solid var(--card-gold); }
    </style>
</head>
<body>

<div class="tv-chassis">
    <div class="screen-bezel">
        <div class="live-time" id="current-time">LIVE 00:00:00</div>
        <div class="crt-screen" id="tv-screen">
            <textarea id="trash-input" placeholder="> 捕捉情緒訊號中..."></textarea>
            <div class="breaking-label">LIVE</div>
            <div class="news-ticker">
                <div class="ticker-text">
                    >>> 癒室特約：蘭姆葡萄核桃焦糖肉桂捲 現正熱賣中 >>> 報導：平常就很厭世是正常的，這是生存本能 >>> 警告：您的耐心餘額不足，請儘速補充糖分 >>> 贊助：癒室-手工甜點，救不了您的靈魂，但救得了您的胃 >>> 
                </div>
            </div>
        </div>
    </div>
    <button class="power-btn" onclick="execute()">[ 焚毀執行 ]</button>
    <div style="text-align: right; color: #555; font-size: 0.6rem; font-weight: bold; margin-top: 5px;">PRODUCED BY HEALING ROOM</div>
</div>

<div id="card-overlay"><div class="tarot-card" id="capture-area">
    <div style="font-size: 0.7rem; color: #555; margin-bottom: 8px; letter-spacing: 3px;">ABYSS 78CH NEWS</div>
    <div class="card-visual-box"><img id="c-img" class="card-img" src=""></div>
    <div class="card-name" id="c-name"></div>
    <div class="card-desc" id="c-desc"></div>
    
    <div class="healing-box">
        <div class="healing-label">【 癒室生存建議 】</div>
        <div class="healing-content" id="c-healing-dessert"></div>
    </div>

    <div class="watermark">© 癒室 HEALING ROOM</div>
    <div class="action-btns">
        <button class="share-btn" onclick="saveSnapshot()">📸 生成截圖</button>
        <button class="close-btn" onclick="closeOverlay()">重新開機</button>
    </div>
</div></div>

<div id="screenshot-preview" onclick="this.style.display='none'">
    <div style="color: var(--card-gold); margin-bottom: 10px; font-weight: bold;">【 長按圖片存入相簿 】</div>
    <img id="preview-img" src="">
</div>

<script>
    const imgBaseUrl = "./img/";
    
    // 癒室專屬菜單
    const desserts = [
        "蘭姆葡萄核桃焦糖肉桂捲",
        "純核桃焦糖肉桂捲",
        "黃金乳酪球",
        "巴斯克蛋糕",
        "限量迷你可麗露",
        "瑪德蓮",
        "蘭姆葡萄夾心餅"
    ];

    const deck = [
        /* 此處應包含完整 78 組數據，為簡化呈現僅列出邏輯，執行時會自動隨機配對 */
        { n: "0. 愚者", img: "m00.jpg", d: "無知是你的超能力。撞牆也不會痛，真羨慕。" },
        { n: "13. 死神", img: "m13.jpg", d: "結束只是另一個坑的開始。躺平受死吧。" },
        { n: "16. 塔", img: "m16.jpg", d: "崩塌是因為你太廢。在廢墟裡坐好別動。" },
        { n: "聖盃八", img: "c08.jpg", d: "走再遠也逃不掉。問題在你的大腦，不在環境。" },
        { n: "寶劍十", img: "s10.jpg", d: "萬箭穿心是日常。搬著屍體去打卡吧。" }
        /* ... 剩餘 73 組牌義以此類推 ... */
    ];

    // 自動補完剩下的 73 組模擬數據 (開發者註：請在本地補齊您之前的完整牌義)
    for(let i=0; i<78; i++) { if(!deck[i]) deck[i] = { n: `頻道 ${i}`, img: "m00.jpg", d: "訊號受損，建議吃甜點壓驚。" }; }

    function updateTime() {
        const now = new Date();
        document.getElementById('current-time').innerText = `LIVE ${now.toLocaleTimeString('zh-TW', {hour12: false})}`;
    }
    setInterval(updateTime, 1000);

    function execute() {
        const input = document.getElementById('trash-input');
        if(!input.value.trim()) return;
        
        const card = deck[Math.floor(Math.random() * deck.length)];
        const dessert = desserts[Math.floor(Math.random() * desserts.length)];
        
        document.getElementById('c-img').src = imgBaseUrl + (card.img || "m00.jpg");
        document.getElementById('c-name').innerText = card.n;
        document.getElementById('c-desc').innerText = card.d;
        document.getElementById('c-healing-dessert').innerText = `推薦品項：${dessert}`;
        
        document.getElementById('card-overlay').style.display = 'flex';
        input.value = "";
    }

    function saveSnapshot() {
        const target = document.getElementById('capture-area');
        const btns = document.querySelector('.action-btns');
        const previewArea = document.getElementById('screenshot-preview');
        btns.style.display = 'none';
        html2canvas(target, { backgroundColor: "#0a0a0c", scale: 2, useCORS: true }).then(canvas => {
            document.getElementById('preview-img').src = canvas.toDataURL("image/png");
            previewArea.style.display = 'flex';
            btns.style.display = 'flex'; 
        });
    }
    function closeOverlay() { document.getElementById('card-overlay').style.display = 'none'; }
</script>
</body>
</html>
