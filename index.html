<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE ABYSS | 手機直式地獄版</title>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        :root {
            --bg: #030305; --tv-case: #2c2c32; --screen-bg: #050805;
            --phosphor-green: #39ff14; --fire: #ff3e3e; --card-gold: #c5a059; --news-red: #cc0000;
            --noise-color: rgba(255, 50, 50, 0.3);
        }

        body {
            background-color: var(--bg); background-image: radial-gradient(circle at center, #1a1a2e 0%, #030305 100%);
            font-family: 'Courier New', 'PingFang TC', monospace; display: flex; align-items: center; justify-content: center;
            min-height: 100vh; margin: 0; overflow: hidden; touch-action: manipulation;
        }

        /* --- 針對手機優化的直式機身 --- */
        .tv-chassis {
            position: relative; background: var(--tv-case); border-radius: 30px; 
            padding: 20px; width: 92vw; max-width: 400px;
            border: 5px solid #111; box-shadow: inset 0 5px 15px rgba(255,255,255,0.1), 0 30px 60px rgba(0,0,0,0.9);
            display: flex; flex-direction: column; gap: 15px; transition: all 1s ease;
        }
        .tv-chassis.charred {
            background: #0a0a0a; border-color: #000;
            box-shadow: inset 0 0 50px rgba(255, 62, 62, 0.3), 0 0 100px rgba(255, 62, 62, 0.4);
        }

        /* 螢幕區域 */
        .screen-bezel { background: #000; border-radius: 20px; padding: 12px; box-shadow: inset 0 5px 30px rgba(0,0,0,1); border: 2px solid #222; }
        .crt-screen { 
            position: relative; background: var(--screen-bg); border-radius: 12px; 
            width: 100%; height: 60vh; max-height: 500px; overflow: hidden; border: 2px solid #1a2e1a; 
            display: flex; flex-direction: column;
        }

        /* 跑馬燈 */
        .news-ticker {
            position: absolute; bottom: 0; left: 0; width: 100%; background: rgba(0, 0, 0, 0.9);
            border-top: 1px solid var(--phosphor-green); color: var(--phosphor-green); height: 40px; line-height: 40px;
            font-size: 1.1rem; white-space: nowrap; overflow: hidden; z-index: 10;
        }
        .ticker-text { display: inline-block; padding-left: 100%; animation: ticker 12s linear infinite; }
        @keyframes ticker { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }
        .breaking-label { position: absolute; bottom: 0; left: 0; background: var(--news-red); color: white; padding: 0 10px; height: 40px; line-height: 40px; z-index: 11; font-weight: 900; font-size: 0.9rem; }

        #trash-input { 
            width: 100%; flex-grow: 1; background: transparent; border: none; outline: none; resize: none; 
            color: var(--phosphor-green); font-size: 1.8rem; font-weight: bold; padding: 20px; 
            text-shadow: 0 0 8px rgba(57, 255, 20, 0.6); font-family: inherit; 
        }

        /* 手機版下方控制區 */
        .control-bar { display: flex; justify-content: space-between; align-items: center; padding: 0 10px; }
        .knobs-row { display: flex; gap: 15px; }
        .knob { width: 25px; height: 25px; background: #111; border-radius: 50%; border: 2px solid #444; box-shadow: 0 3px 0 #000; }
        .power-btn { background: #a00; color: #fff; border: 3px solid #500; padding: 12px 25px; border-radius: 8px; font-size: 1.2rem; font-weight: 900; cursor: pointer; box-shadow: 0 5px 0 #300; }

        .tv-shutdown { animation: tvOff 0.5s forwards; }
        @keyframes tvOff { 0% { transform: scale(1, 1); } 40% { transform: scale(1, 0.005); background: #fff; } 100% { transform: scale(0, 0); opacity: 0; } }

        /* --- 抽牌彈窗 (手機比例優化) --- */
        #card-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); display: none; align-items: center; justify-content: center; z-index: 2000; }
        .tarot-card { 
            width: 85vw; max-width: 360px; min-height: 80vh; background: #0a0a0c; border: 3px solid var(--fire); border-radius: 15px; padding: 25px; 
            display: flex; flex-direction: column; align-items: center; text-align: center;
        }

        /* 雜訊符號框 */
        .symbol-box { 
            width: 160px; height: 260px; margin-bottom: 20px; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 7rem; line-height: 1; position: relative; overflow: hidden; border: 2px solid var(--fire);
            background: #000; color: var(--fire); text-shadow: 3px 0 0 var(--news-red), -3px 0 0 #0ff;
            animation: symbolGlitch 0.2s infinite alternate;
        }
        .symbol-box::before {
            content: ""; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: repeating-radial-gradient(circle, var(--noise-color) 0%, transparent 8px, #000 15px);
            background-size: 8px 8px; opacity: 0.4; animation: noiseMove 0.3s infinite linear;
        }
        @keyframes noiseMove { 0% { transform: translate(0, 0); } 100% { transform: translate(15px, 15px); } }
        @keyframes symbolGlitch {
            0% { text-shadow: 3px 2px 0 var(--news-red), -2px -2px 0 #0ff; transform: skewX(1deg); }
            100% { text-shadow: -2px -2px 0 var(--news-red), 3px 2px 0 #0ff; transform: skewX(-1deg); }
        }

        .card-name { color: var(--fire); font-size: 2.8rem; font-weight: 900; margin-bottom: 15px; text-decoration: underline; }
        .card-desc { font-size: 1.8rem; line-height: 1.4; color: #fff; font-weight: bold; margin-bottom: 25px; padding: 0 10px; }
        
        .action-btns { display: flex; flex-direction: column; gap: 10px; width: 100%; margin-top: auto; }
        .share-btn { background: var(--fire); color: #000; border: none; padding: 15px; border-radius: 8px; font-weight: 900; font-size: 1.1rem; }
        .close-btn { background: #333; color: #fff; border: none; padding: 12px; border-radius: 8px; font-weight: 900; font-size: 1rem; }
    </style>
</head>
<body>

<div class="tv-chassis" id="tv-frame">
    <div class="main-body">
        <div class="screen-bezel">
            <div class="crt-screen" id="tv-screen">
                <textarea id="trash-input" placeholder="> 訊號捕捉中..." oninput="updateTicker()"></textarea>
                <div class="breaking-label" id="ticker-label">LIVE</div>
                <div class="news-ticker">
                    <div class="ticker-text" id="ticker-msg">>>> 即時處決：等待輸入... >>> 深淵新聞：開工倒數中... >>></div>
                </div>
            </div>
        </div>
    </div>
    <div class="control-bar">
        <div class="knobs-row">
            <div class="knob"></div>
            <div class="knob"></div>
        </div>
        <button class="power-btn" onclick="execute()">[ 焚毀 ]</button>
    </div>
</div>

<div id="card-overlay">
    <div class="tarot-card" id="capture-area">
        <div style="font-size: 0.7rem; color: var(--fire); margin-bottom: 10px; letter-spacing: 3px;">[ SIGNAL CORRUPTED ]</div>
        <div style="color: #666; font-size: 0.9rem; border-bottom: 1px solid var(--fire); padding-bottom: 8px; margin-bottom: 15px; width: 100%;">訊號來源：<span style="color:var(--fire)" id="disp-orig"></span></div>
        <div class="symbol-box" id="c-symbol">?</div>
        <div class="card-name" id="c-name"></div>
        <div class="card-desc" id="c-desc"></div>
        <div class="action-btns">
            <button class="share-btn" onclick="saveSnapshot()">📸 生成截圖發 IG 限動</button>
            <button class="close-btn" onclick="closeOverlay()">重新開機</button>
        </div>
    </div>
</div>

<script>
    const deck = [
        { n: "0. 愚者", s: "🃏", d: "冒險只是無知的代稱。你沒腦子，撞牆也不痛。" },
        { n: "13. 死神", s: "💀", d: "期待結束是奢侈。痛苦只會輪迴，躺平受死吧。" },
        { n: "15. 惡魔", s: "⛓️", d: "你是薪水的性奴。回去戴上枷鎖，別想了。" },
        { n: "16. 塔", s: "⚡", d: "崩塌是因為地基太爛。就在廢墟裡坐好，別亂動。" },
        { n: "寶劍十", s: "⚔️", d: "你已萬箭穿心。搬著屍體去打卡認命吧。" },
        { n: "聖盃八", s: "👣", d: "離開也沒用。問題在你的智商，不在環境。" }
        // ... 此處請維持你之前的 35 組完整牌義 ...
    ];

    function updateTicker() {
        const val = document.getElementById('trash-input').value;
        const tickerMsg = document.getElementById('ticker-msg');
        if(val.trim()) { tickerMsg.innerText = `>>> BREAKING NEWS：${val} >>> 執行焚毀... >>> `; }
    }

    function execute() {
        const input = document.getElementById('trash-input');
        const frame = document.getElementById('tv-frame');
        const screen = document.getElementById('tv-screen');
        const val = input.value.trim();
        if(!val) return;

        document.getElementById('disp-orig').innerText = val;
        if(['幹', '死', '煩', '爛', '垃圾', '廢', '窮', '開工'].some(w => val.includes(w))) frame.classList.add('charred');

        screen.classList.add('tv-shutdown');
        setTimeout(() => {
            const card = deck[Math.floor(Math.random() * deck.length)];
            document.getElementById('c-symbol').innerText = card.s;
            document.getElementById('c-name').innerText = card.n;
            document.getElementById('c-desc').innerText = card.d;
            document.getElementById('card-overlay').style.display = 'flex';
            input.value = ""; screen.classList.remove('tv-shutdown');
        }, 600);
    }

    function saveSnapshot() {
        const target = document.getElementById('capture-area');
        const btns = document.querySelector('.action-btns');
        btns.style.display = 'none';
        html2canvas(target, { backgroundColor: "#0a0a0c", scale: 2 }).then(canvas => {
            const link = document.createElement('a');
            link.download = `THE-ABYSS-${Date.now()}.png`;
            link.href = canvas.toDataURL("image/png"); link.click();
            btns.style.display = 'flex';
            alert("處決截圖已生成！請至相簿挑選並上傳 IG 限動。");
        });
    }

    function closeOverlay() { document.getElementById('card-overlay').style.display = 'none'; }
</script>
</body>
</html>
