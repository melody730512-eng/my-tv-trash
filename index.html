<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE ABYSS | 35組地獄牌義 & IG分享版</title>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        :root {
            --bg: #030305;
            --tv-case: #2c2c32;
            --screen-bg: #050805;
            --phosphor-green: #39ff14;
            --fire: #ff3e3e;
            --card-gold: #c5a059;
        }

        body {
            background-color: var(--bg);
            background-image: radial-gradient(circle at center, #1a1a2e 0%, #030305 100%);
            font-family: 'Courier New', 'PingFang TC', monospace;
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh; margin: 0; overflow: hidden;
        }

        /* --- 實體重裝電視機身 --- */
        .tv-chassis {
            position: relative; background: var(--tv-case);
            border-radius: 40px; padding: 40px 100px 40px 50px;
            border: 6px solid #111;
            box-shadow: inset 0 10px 20px rgba(255,255,255,0.1), 0 50px 100px rgba(0,0,0,0.9);
            display: flex; align-items: center;
            transition: all 1.2s ease;
        }

        .tv-chassis.charred {
            background: #0a0a0a; border-color: #000;
            box-shadow: inset 0 0 60px rgba(255, 62, 62, 0.25), 0 0 120px rgba(255, 62, 62, 0.4);
        }

        .side-panel { position: absolute; right: 20px; top: 50%; transform: translateY(-50%); width: 60px; display: flex; flex-direction: column; gap: 25px; align-items: center; }
        .knob { width: 35px; height: 35px; background: #111; border-radius: 50%; border: 3px solid #444; box-shadow: 0 5px 0 #000; }
        .speaker { width: 30px; height: 120px; background: repeating-linear-gradient(transparent, transparent 4px, #111 4px, #111 8px); opacity: 0.5; }

        .screen-bezel { background: #000; border-radius: 25px; padding: 20px; box-shadow: inset 0 5px 40px rgba(0,0,0,1); border: 2px solid #222; }
        .crt-screen { position: relative; background: var(--screen-bg); border-radius: 15px; width: 600px; height: 450px; overflow: hidden; border: 3px solid #1a2e1a; }
        .crt-screen::before { content: " "; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.35) 50%); background-size: 100% 4px; z-index: 5; pointer-events: none; }

        #trash-input { width: 100%; height: 100%; background: transparent; border: none; outline: none; resize: none; color: var(--phosphor-green); font-size: 2.8rem; font-weight: bold; padding: 45px; box-sizing: border-box; text-shadow: 0 0 12px rgba(57, 255, 20, 0.7); font-family: inherit; }

        .btn-container { margin-top: 35px; text-align: right; }
        .power-btn { background: #a00; color: #fff; border: 4px solid #500; padding: 18px 50px; border-radius: 10px; font-size: 1.8rem; font-weight: 900; cursor: pointer; box-shadow: 0 8px 0 #300; transition: 0.1s; }
        .power-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #300; }

        /* --- 關機動畫 --- */
        .tv-shutdown { animation: tvOff 0.6s forwards; }
        @keyframes tvOff {
            0% { transform: scale(1, 1); filter: brightness(1); }
            40% { transform: scale(1, 0.005); filter: brightness(10); background: #fff; }
            100% { transform: scale(0, 0); opacity: 0; }
        }

        /* --- 卡牌彈窗與截圖區域 --- */
        #card-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); display: none; align-items: center; justify-content: center; z-index: 2000; }
        
        .tarot-card { 
            width: 450px; min-height: 820px; background: #0a0a0c; border: 4px solid var(--card-gold); border-radius: 20px; padding: 40px; 
            display: flex; flex-direction: column; align-items: center; text-align: center;
            box-shadow: 0 0 50px rgba(0,0,0,1);
        }

        .original-trash { border-bottom: 1px solid #333; padding-bottom: 15px; margin-bottom: 20px; width: 100%; color: #555; font-size: 1.1rem; }
        .trash-text { color: var(--phosphor-green); display: block; margin-top: 5px; font-size: 1.6rem; font-family: monospace; }
        
        .card-img { height: 300px; border: 2px solid #333; margin-bottom: 25px; }
        .card-name { color: var(--fire); font-size: 3.8rem; font-weight: 900; margin-bottom: 20px; text-decoration: underline; }
        .card-desc { font-size: 2.4rem; line-height: 1.3; color: #fff; font-weight: bold; margin-bottom: 30px; }
        
        .action-btns { display: flex; gap: 10px; width: 100%; margin-top: auto; }
        .share-btn { flex: 1.5; background: var(--card-gold); color: #000; border: none; padding: 15px; border-radius: 10px; font-weight: 900; cursor: pointer; font-size: 1.2rem; }
        .close-btn { flex: 1; background: #333; color: #fff; border: none; padding: 15px; border-radius: 10px; font-weight: 900; cursor: pointer; font-size: 1.2rem; }
    </style>
</head>
<body>

<div class="tv-chassis" id="tv-frame">
    <div class="side-panel">
        <div class="knob"></div><div class="knob"></div>
        <div class="speaker"></div><div class="speaker"></div>
    </div>
    <div class="main-body">
        <div class="screen-bezel">
            <div class="crt-screen" id="tv-screen">
                <textarea id="trash-input" placeholder="> 訊號捕捉中..."></textarea>
            </div>
        </div>
        <div class="btn-container">
            <button class="power-btn" onclick="execute()">[ 焚毀執行 ]</button>
        </div>
    </div>
</div>

<div id="card-overlay">
    <div class="tarot-card" id="capture-area">
        <div class="original-trash">
            訊號來源：
            <span class="trash-text" id="display-original"></span>
        </div>
        <img id="c-img" class="card-img" src="" alt="card">
        <div class="card-name" id="c-name"></div>
        <div class="card-desc" id="c-desc"></div>
        <div class="action-btns">
            <button class="share-btn" onclick="saveSnapshot()">📸 截圖發 IG</button>
            <button class="close-btn" onclick="closeOverlay()">重新開機</button>
        </div>
    </div>
</div>

<script>
    const imgBaseUrl = "https://www.sacred-texts.com/tarot/pkt/img/";
    
    // --- 完整 35 組地獄牌義 ---
    const deck = [
        { n: "0. 愚者", img: "ar00.jpg", d: "冒險只是無知的代稱。你沒腦子，撞牆也不痛。" },
        { n: "1. 魔術師", img: "ar01.jpg", d: "你不是有才華，只是愛吹牛。認命回去搬磚。" },
        { n: "2. 女祭司", img: "ar02.jpg", d: "沉默不是智慧是尷尬。沒人想懂你的內心戲。" },
        { n: "3. 皇后", img: "ar03.jpg", d: "儀式感救不了戶頭。你是窮人的命公主的病。" },
        { n: "4. 皇帝", img: "ar04.jpg", d: "老闆是你爹，公司是你家。跪著把錢掙了。" },
        { n: "5. 教皇", img: "ar05.jpg", d: "貧窮是你的職業。認命吧，這輩子沒救了。" },
        { n: "6. 戀人", img: "ar06.jpg", d: "他沒回你是在跟別人忙。你只是備胎裡的殘次品。" },
        { n: "7. 戰車", img: "ar07.jpg", d: "衝向未來？不，是衝向勞改營。別想跳車。" },
        { n: "8. 力量", img: "ar08.jpg", d: "堅持不會成功只會過勞。放棄吧，牆比你硬。" },
        { n: "9. 隱士", img: "ar09.jpg", d: "沒人找你是因為你可有可無。安靜發霉吧。" },
        { n: "10. 命運輪", img: "ar10.jpg", d: "輪流轉是指別人發財你倒霉。認命被壓死。" },
        { n: "11. 正義", img: "ar11.jpg", d: "沒錢就沒資格喊累。上班是你的現世報。" },
        { n: "12. 倒吊人", img: "ar12.jpg", d: "無謂的犧牲只是自我感動。換個姿勢受苦吧。" },
        { n: "13. 死神", img: "ar13.jpg", d: "期待結束是奢侈。痛苦只會輪迴，躺平受死吧。" },
        { n: "14. 節制", img: "ar14.jpg", d: "追求平衡是因為沒膽。你的人生注定一碗清水。" },
        { n: "15. 惡魔", img: "ar15.jpg", d: "你是薪水的性奴。回去戴上枷鎖，別想了。" },
        { n: "16. 塔", img: "ar16.jpg", d: "崩塌是因為地基太爛。就在廢墟裡坐好，別亂動。" },
        { n: "17. 星夢", img: "ar17.jpg", d: "夢想是拿來燒的。看著餘燼早點睡，別做夢。" },
        { n: "18. 月亮", img: "ar18.jpg", d: "粉紅泡泡是腦部積水。他連你名字都記不住。" },
        { n: "19. 太陽", img: "ar19.jpg", d: "陽光讓你更醜。黑暗才是歸宿，別裝正能量。" },
        { n: "20. 審判", img: "ar20.jpg", d: "判決結果：繼續勞改。這是你欠生活的債。" },
        { n: "21. 世界", img: "ar21.jpg", d: "繞了一圈還是在原地。你的終點就是垃圾桶。" },
        { n: "寶劍十", img: "sw10.jpg", d: "你已萬箭穿心。搬著屍體去打卡認命吧。" },
        { n: "寶劍三", img: "sw03.jpg", d: "心碎？不，只是認清現實。你根本不值得被愛。" },
        { n: "寶劍九", img: "sw09.jpg", d: "失眠是因為你活該。醒著痛苦總比夢裡受騙好。" },
        { n: "八之寶劍", img: "sw08.jpg", d: "眼罩是你自己戴的。因為現實太醜，你不敢看。" },
        { n: "五之金幣", img: "pe05.jpg", d: "窮不是病，但讓你像喪屍。別看餘額了。" },
        { n: "二之金幣", img: "pe02.jpg", d: "忙著瞎忙？你只是在表演努力。認命當窮忙族。" },
        { n: "七之金幣", img: "pe07.jpg", d: "耕耘了也沒收穫。你種的是雜草，別等了。" },
        { n: "聖盃三", img: "cu03.jpg", d: "聚會笑聲是嘲諷。你沒朋友，只有臨時演員。" },
        { n: "聖盃八", img: "cu08.jpg", d: "離開也沒用。問題在你的智商，不在環境。" },
        { n: "聖盃五", img: "cu05.jpg", d: "哭也沒錢拿。剩下的半杯也是酸的，倒了吧。" },
        { n: "權杖九", img: "wa09.jpg", d: "防衛也沒用。世界想弄死你，你擋不住的。" },
        { n: "權杖七", img: "wa07.jpg", d: "一個對抗全世界？那是電影，現實是你會被打死。" },
        { n: "權杖十", img: "wa10.jpg", d: "累死也沒人感激。你只是台快報廢的機器。" }
    ];

    function playSfx() {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const buffer = ctx.createBuffer(1, ctx.sampleRate * 0.6, ctx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
        const noise = ctx.createBufferSource();
        noise.buffer = buffer;
        const gain = ctx.createGain();
        const filter = ctx.createBiquadFilter();
        filter.type = 'lowpass';
        noise.connect(filter); filter.connect(gain); gain.connect(ctx.destination);
        const now = ctx.currentTime;
        gain.gain.setValueAtTime(0.5, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.6);
        filter.frequency.setValueAtTime(1200, now);
        filter.frequency.exponentialRampToValueAtTime(10, now + 0.6);
        noise.start(); noise.stop(now + 0.6);
    }

    function execute() {
        const input = document.getElementById('trash-input');
        const frame = document.getElementById('tv-frame');
        const screen = document.getElementById('tv-screen');
        const val = input.value.trim();
        if(!val) return;

        document.getElementById('display-original').innerText = `> ${val}`;
        
        const badWords = ['幹', '死', '煩', '爛', '垃圾', '廢', '窮', '開工'];
        if(badWords.some(w => val.includes(w))) frame.classList.add('charred');
        else frame.classList.remove('charred');

        playSfx();
        screen.classList.add('tv-shutdown');

        setTimeout(() => {
            const card = deck[Math.floor(Math.random() * deck.length)];
            const img = document.getElementById('c-img');
            img.crossOrigin = "anonymous"; // 關鍵：防止截圖空白
            img.src = imgBaseUrl + card.img;
            
            document.getElementById('c-name').innerText = card.n;
            document.getElementById('c-desc').innerText = card.d;
            document.getElementById('card-overlay').style.display = 'flex';
            input.value = "";
            screen.classList.remove('tv-shutdown');
        }, 700);
    }

    function saveSnapshot() {
        const target = document.getElementById('capture-area');
        const btns = document.querySelector('.action-btns');
        btns.style.display = 'none'; // 截圖時隱藏按鈕

        html2canvas(target, {
            backgroundColor: "#0a0a0c",
            useCORS: true,
            scale: 2
        }).then(canvas => {
            const link = document.createElement('a');
            link.download = `THE-ABYSS-STORY-${Date.now()}.png`;
            link.href = canvas.toDataURL("image/png");
            link.click();
            btns.style.display = 'flex';
            alert("處決截圖已存入相簿！快去 IG 標註你的受難日。");
        });
    }

    function closeOverlay() {
        document.getElementById('card-overlay').style.display = 'none';
    }
</script>

</body>
</html>
